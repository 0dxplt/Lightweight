<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title id="page-title">Rankings</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" [scrollY]="false">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">rankings</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-segment-view style="height: 100%;">
    <ion-segment-content id="global">
      <app-ranking-list filter="global"></app-ranking-list>
    </ion-segment-content>
    <ion-segment-content id="seasonal">
      <app-ranking-list filter="seasonal"></app-ranking-list>
    </ion-segment-content>
  </ion-segment-view>
</ion-content>

<ion-footer>
  <ion-toolbar>
    <ion-segment value="global">
      <ion-segment-button value="global" content-id="global">
        <ion-label>Global</ion-label>
      </ion-segment-button>
      <ion-segment-button value="seasonal" content-id="seasonal">
        <ion-label>Seasonal</ion-label>
      </ion-segment-button>
    </ion-segment>
  </ion-toolbar>
</ion-footer>
