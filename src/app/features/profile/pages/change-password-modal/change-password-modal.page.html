<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button color="medium" (click)="cancel()">Cancel</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense" class="ion-no-border">
    <ion-toolbar>
      <ion-title size="large">Update Password</ion-title>
    </ion-toolbar>
  </ion-header>

  <div id="form-container">
    <div class="cp-header">
      <span>Update Password</span>
    </div>

    <form [formGroup]="changePasswordFormGroup" (ngSubmit)="confirm()">
      
      <!-- Old Password -->
      <ion-item class="input-item" lines="full">
        <ion-input
          label="Old password"
          labelPlacement="floating"
          [type]="oldPasswordType()"
          formControlName="oldPassword">
        </ion-input>
        <ion-icon 
          slot="end"
          [name]="showOld() ? 'eye-off-outline' : 'eye-outline'" 
          class="password-toggle-icon"
          (click)="toggleOld()">
        </ion-icon>
      </ion-item>

      <!-- New Password -->
      <ion-item class="input-item" lines="full">
        <ion-input
          label="New password"
          labelPlacement="floating"
          [type]="newPasswordType()"
          formControlName="newPassword">
        </ion-input>
        <ion-icon 
          slot="end"
          [name]="showNew() ? 'eye-off-outline' : 'eye-outline'" 
          class="password-toggle-icon"
          (click)="toggleNew()">
        </ion-icon>
      </ion-item>

      <!-- Repeat Password -->
      <ion-item class="input-item" lines="full">
        <ion-input
          label="Repeat new password"
          labelPlacement="floating"
          [type]="repPasswordType()"
          formControlName="repeatPass">
        </ion-input>
        <ion-icon 
          slot="end"
          [name]="showRep() ? 'eye-off-outline' : 'eye-outline'" 
          class="password-toggle-icon"
          (click)="toggleRep()">
        </ion-icon>
      </ion-item>

      <ion-button 
        type="submit" 
        class="submit-button"
        expand="block" 
        [disabled]="changePasswordFormGroup.invalid">
        Confirm
      </ion-button>

    </form>
  </div>
</ion-content>
