<ion-content style="--background: #1a1a1a; --color: white;">
  <div id="wrapper">
    <!-- Info Palestra -->
    <div id="gym-info">
      <h3>{{this.gym.name}}</h3>
      <div class="location-info">
        <ion-icon name="location-outline"></ion-icon>
        <span>{{this.gym.address}}</span>
      </div>
    </div>

    <!-- Container Mappa -->
    <div class="map-wrapper">
      <div id="map-id"></div>
    </div>
  </div>
</ion-content>
