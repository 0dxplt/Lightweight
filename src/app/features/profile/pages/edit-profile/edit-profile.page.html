<ion-content [fullscreen]="true">
  <form [formGroup]="this.userForm" (ngSubmit)="confirmChanges()">
    <div id="user-container">
      <div id="user-header" (click)="fileInput.click()" style="cursor: pointer;">
      <img [src]="imagePreview() || user()?.propic || '/assets/icon/favicon.png'" alt="propic">
      <input 
      #fileInput
      type="file" 
      (change)="onFileSelected($event)" 
      accept="image/*" 
      style="display: none;">
    </div>
    <div id="user-info-container">
      <ion-item lines="none">
        <ion-input
          formControlName="username"
          label="Username",
          labelPlacement="floating",
          [counter]="true"
          [minlength]="minUsernameLength()"
          [maxlength]="maxUsernameLength()"
          [errorText]="usernameErrorText()">
        </ion-input>
      </ion-item>
      <ion-item lines="none">
        <ion-input
          [required]="this.verified()"
          formControlName="name"
          label="Name",
          labelPlacement="floating"
          [counter]="true"
          [minlength]="minNameLength()"
          [maxlength]="maxNameLength()"
          [errorText]="nameErrorText()">
        </ion-input>
      </ion-item>
      <ion-item lines="none">
        <ion-input
          [required]="this.verified()"
          formControlName="surname"
          label="Surname",
          labelPlacement="floating"
          [counter]="true"
          [minlength]="minSurnameLength()"
          [maxlength]="maxSurnameLength()"
          [errorText]="surnameErrorText()">
        </ion-input>
      </ion-item>
      <ion-item lines="none">
        <ion-input
          formControlName="email"
          label="Email",
          labelPlacement="floating"
          errorText="Invalid email (es: try@again.please)">
        </ion-input>
      </ion-item>
      <ion-item lines="none">
        <ion-input
          [required]="this.verified()"
          type="date"
          formControlName="birthdate"
          label="Birthdate",
          labelPlacement="floating"
          errorText="Insert a valid date">
        </ion-input>
      </ion-item>
      <ion-item lines="none">
        <ion-input
          formControlName="weight"
          type="number"
          label="Weight",
          labelPlacement="floating"
          [errorText]="weightErrorText()">
        </ion-input>
      </ion-item>
      <ion-item lines="none">
        <ion-input
          formControlName="height"
          type="number"
          label="Height",
          labelPlacement="floating"
          [errorText]="heightErrorText()">
        </ion-input>
      </ion-item>
      <ion-item lines="none">
        <ion-select
        [required]="this.verified()"
        label="Nation" 
        labelPlacement="floating" 
        formControlName="nationality" 
        interface="modal"
        [interfaceOptions]="customSelectFilter"
        [compareWith]="compareNationalities"
        errorText="Insert a valid Nation">
          @for (item of this.nations(); track item.id) {
            <ion-select-option [value]="item">{{ item.name }}</ion-select-option>
          }
        </ion-select>
      </ion-item>
    </div>
    </div>
    @if (this.isPT()) {
      <div id="pt-container">
        <div id="pt-info-container">
          <ion-item lines="none">
            <ion-input
              formControlName="proemail"
              label="Professional Email"
              labelPlacement="floating"
              errorText="Invalid email (es: try@again.please)">
            </ion-input>
          </ion-item>
          <!-- <ion-item lines="none">
            <ion-select
              [compareWith]="compareCities"
              label="City" 
              labelPlacement="floating" 
              formControlName="city" 
              interface="modal"
              errorText="Insert a valid City">
              @for (item of this.cities(); track item.id) {
                <ion-select-option [value]="item">{{ item.name }} ({{item.nation.name}})</ion-select-option>
              }
            </ion-select>
          </ion-item> -->
          <ion-item lines="none">
            <ion-select 
              [compareWith]="compareGyms"
              label="Gym" 
              labelPlacement="floating" 
              formControlName="gym" 
              interface="modal"
              [interfaceOptions]="customSelectFilter"
              (ionChange)="gymChanged($event)"
              errorText="Insert a valid Gym">
              @for (item of this.gyms(); track item.id) {
                <ion-select-option [value]="item">{{ item.name }} ({{ item.address }})</ion-select-option>
              }
              <ion-select-option value="ADD_NEW" class="add-new-option">Add new gym</ion-select-option>
            </ion-select>
          </ion-item>
        </div>
      </div>
    }
    <ion-button type="submit" [disabled]="userForm.invalid">
      Confirm Changes
    </ion-button>
  </form>
</ion-content>
