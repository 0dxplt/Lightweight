<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-button fill="outline" id="open-city-modal">{{ selectedCity ? selectedCity : 'Seleziona una città'}}</ion-button>
    <ion-modal #cityModal trigger="open-city-modal" [initialBreakpoint]="0.25" [breakpoints]="[0, 0.25, 0.5, 0.75]" [expandToScroll]="false">
      <ng-template>
        <ion-content>
          <ion-searchbar (ionInput)="handleInput($event)" placeholder="Search"
            (click)="cityModal.setCurrentBreakpoint(0.75)"></ion-searchbar>
          <ion-list>
            @for (city of results; track city) {
            <ion-item button (click)="selectCity(city, cityModal)" class="result-item">
              <ion-label>{{ city }}</ion-label>
            </ion-item>
            }
          </ion-list>
        </ion-content>
      </ng-template>
    </ion-modal>
    <ion-button (click)="getCity()" fill="outline">
      GPS
      <ion-icon slot="end" name="navigate-outline"></ion-icon>
    </ion-button>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="pt-cards">
    @for (pt of filtered_pts; track pt) {
      <app-pt-card
      [fotoUrl]="pt.fotoUrl"
      [username]="pt.username"
      [nome]="pt.nome"
      [palestra]="pt.palestra"
      [eta]="pt.eta"
      ></app-pt-card>
    }
  </div>
</ion-content>
