<ion-item-sliding #itemSliding>
  
  <ion-item-options side="start" (click)="approveRequest(itemSliding)">
    <ion-item-option color="success">
      <ion-icon name="checkmark-done" style="width: 30px; height: 30px;"></ion-icon>
    </ion-item-option>
  </ion-item-options>
  
  <ion-item (click)="requestReview()" button>
    <!-- 1. ID (Allineato a sinistra, larghezza fissa) -->
    <div slot="start" class="id-container">
      {{this.request().id}}
    </div>

    <!-- 3. INFO Requester (Username) -->
    <ion-label>
      <div class="requester-content">
        <span class="requester-username" style="color: var(--ion-color-tertiary);">
          {{this.request().user.username}}
        </span>
      </div>
    </ion-label>

    <!-- 3. DATA (Allineata alla fine a destra) -->
    <div slot="end" class="level-container">
      <span class="complete-date">
        {{(this.request().timestamp | datefy)}}
      </span>
    </div>

  </ion-item>

  <ion-item-options side="end" (click)="rejectRequest(itemSliding)">
    <ion-item-option color="danger">
      <ion-icon name="close-circle" style="width: 30px; height: 30px;"></ion-icon>
    </ion-item-option>
  </ion-item-options>
</ion-item-sliding>
