<ion-content class="ion-content-scroll-host">
  <ion-refresher slot="fixed" [pullFactor]="0.5" [pullMin]="100" [pullMax]="200" (ionRefresh)="handleRefresh($event)">
    <ion-refresher-content refreshingSpinner="circles">
    </ion-refresher-content>
  </ion-refresher>

  <ion-list>
    @for (item of this.solvedRequests; track $index) {
      <app-solved-request-item [solvedRequest]="item"></app-solved-request-item>
    }
  </ion-list>
  <ion-infinite-scroll (ionInfinite)="onIonInfinite($event)" threshold="50px" [disabled]="disabled">
    <ion-infinite-scroll-content loadingText="Loading Users..." loadingSpinner="bubbles"></ion-infinite-scroll-content>
  </ion-infinite-scroll>
</ion-content>
