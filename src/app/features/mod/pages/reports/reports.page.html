<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-item>
      <ion-title>Unsolved reports</ion-title>
      <ion-button fill="clear" (click)="goBack()" id="goback">
        <ion-icon slot="icon-only" name="arrow-back" color="tertiary"></ion-icon>
      </ion-button>
    </ion-item>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-content-scroll-host" [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Reports</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-refresher slot="fixed" [pullFactor]="0.5" [pullMin]="100" [pullMax]="200" (ionRefresh)="handleRefresh($event)">
    <ion-refresher-content refreshingSpinner="circles">
    </ion-refresher-content>
  </ion-refresher>

  <ion-list>
    @for (item of this.reports; track $index) {
      <app-report-sliding-item [report]="item" (onConfirm)="requestOutcome(item)" (onReview)="this.openModal(item)"></app-report-sliding-item>
    }
  </ion-list>
  <ion-infinite-scroll (ionInfinite)="onIonInfinite($event)" threshold="50px" [disabled]="disabled">
    <ion-infinite-scroll-content loadingText="Loading Users..." loadingSpinner="bubbles"></ion-infinite-scroll-content>
  </ion-infinite-scroll>
</ion-content>
