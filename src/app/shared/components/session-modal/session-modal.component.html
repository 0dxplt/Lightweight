<ion-modal #modal [isOpen]="isOpen" (ionModalDidDismiss)="onDidDismiss()" [animated]="true" class="desktop-fullscreen">
  <ng-template>
    <ion-header>
      <ion-toolbar>
        <ion-title>Modal</ion-title>
        <ion-buttons slot="end">
          <ion-button (click)="modal.dismiss()">Close</ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>
    <ion-content class="ion-padding">

    </ion-content>
  </ng-template>
</ion-modal>
