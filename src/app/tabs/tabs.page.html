<ion-tabs>
  <ion-tab-bar slot="bottom" [ngClass]=" profileClass()">
    <ion-tab-button tab="pts" href="../features/pts/pages/pts/">
      <ion-icon aria-hidden="true" name="fitness"></ion-icon>
      <ion-label>PTs</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="rankings" href="../features/rankings/pages/rankings/">
      <ion-icon aria-hidden="true" name="trophy"></ion-icon>
      <ion-label>Rankings</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="workouts" href="../features/workouts/pages/workouts/">
      <ion-icon aria-hidden="true" name="barbell"></ion-icon>
      <ion-label>Workouts</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="feed" href="../features/feed/pages/feed/">
      <ion-icon aria-hidden="true" name="search"></ion-icon>
      <ion-label>Feed</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="profile" href="../features/profile/pages/profile/">
      <ion-icon aria-hidden="true" name="person"></ion-icon>
      <ion-label>Profile</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
